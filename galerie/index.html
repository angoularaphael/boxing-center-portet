  <script>(function(){try{var t=localStorage.getItem('bcp-theme');var m={heritage:'dark',arena:'dark',raw:'dark'};var v=['dark','light'];var id=t&&(v.indexOf(t)>=0?t:m[t])||'dark';document.documentElement.setAttribute('data-theme',id);}catch(e){}})();</script>
</head>
<body data-page="galerie">
  <div class="curtain" id="curtain" aria-hidden="true"></div>
  <div id="site-nav"></div>
  <main id="page">
  <section class="page-head">
    <div class="wrap">
      <span class="eyebrow">Galerie</span>
      <h1 class="display"><span class="reveal-line"><span>En images,</span></span><span class="reveal-line"><span>en <span class="tint">mouvement.</span></span></span></h1>
      <p class="lead">Le ring, les sacs, les galas, l'entraînement — et les vidéos postées par la communauté. Des vraies images de Portet.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="sec-head"><div><span class="eyebrow">La salle</span><h2 class="display" style="margin-top:1rem">Le <span class="tint">décor</span></h2></div></div>
      <div class="gallery" id="gallery"></div>
      <div class="clips" id="clips" style="margin-top:1rem"></div>
    </div>
  </section>

  <!-- ===================== LE MUR (communauté) ===================== -->
  <section class="section band community" id="community">
    <div class="wrap">
      <div class="sec-head">
        <div>
          <span class="eyebrow">Le mur</span>
          <h2 class="display" style="margin-top:1rem">La <span class="tint">communauté</span></h2>
        </div>
        <p class="lead" style="max-width:36ch">Tes meilleurs moments au club. Nomme ta vidéo et poste-la — elle rejoint le mur après validation.</p>
      </div>
      <form class="community__form" id="community-form" novalidate>
        <label class="community__drop">
          <input type="file" name="video" accept="video/mp4,video/quicktime,video/webm" id="community-file" />
          <span class="community__hint">Vidéo (mp4/mov/webm) · validée avant publication</span>
        </label>
        <input class="community__text" type="text" name="title" maxlength="60" required placeholder="Nom de la vidéo (obligatoire)" />
        <input class="community__text" type="text" name="author" maxlength="40" placeholder="Ton prénom (optionnel)" />
        <button class="btn btn--primary" type="submit">Envoyer ma vidéo</button>
        <div class="community__bar" aria-hidden="true"><i></i></div>
        <p class="community__status" id="community-status" role="status" aria-live="polite"></p>
      </form>
      <div class="clips community__grid" id="community-grid" style="margin-top:1.4rem"></div>
    </div>
  </section>
  </main>
  <div id="site-footer"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
